<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <rect width="200" height="200" rx="28" fill="#0f2d54"/>
  <!-- City Hall dome -->
  <g fill="white">
    <!-- Spire -->
    <rect x="96" y="28" width="8" height="20" rx="2"/>
    <circle cx="100" cy="26" r="5"/>
    <!-- Dome -->
    <path d="M70 90 Q72 58 100 50 Q128 58 130 90 Z"/>
    <!-- Dome base band -->
    <rect x="68" y="88" width="64" height="8" rx="2"/>
    <!-- Pillars -->
    <rect x="74" y="96" width="6" height="34" rx="1"/>
    <rect x="88" y="96" width="6" height="34" rx="1"/>
    <rect x="106" y="96" width="6" height="34" rx="1"/>
    <rect x="120" y="96" width="6" height="34" rx="1"/>
    <!-- Base -->
    <rect x="64" y="128" width="72" height="8" rx="2"/>
    <!-- Steps -->
    <rect x="58" y="136" width="84" height="5" rx="1"/>
    <rect x="54" y="141" width="92" height="5" rx="1"/>
    <!-- KINGSTON text -->
    <text x="100" y="168" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-weight="bold" letter-spacing="3" fill="white">KINGSTON</text>
    <!-- Wave -->
    <path d="M30 180 Q55 172 80 180 Q105 188 130 180 Q155 172 170 180" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
